server:
  host: "0.0.0.0"
  port: 8081
  gin_mode: "release"

logging:
  level: "info"
  format: "json"

storage:
  data_dir: "./data"

security:
  enable_auth: false
  admin_token: ""
  rate_limit_enabled: true
  rate_limit_requests: 100
  allowed_download_hosts:
    - "youtube.com"
    - "www.youtube.com"
    - "youtu.be"
    - "artlist.com"
    - "www.artlist.com"
    - "artlist.io"
    - "cdn.artlist.io"

external:
  ollama_url: "http://localhost:11434"
  ollama_model: "gemma3:12b"
  pixabay_api_key: ""
  pixabay_base_url: "https://pixabay.com/api"
  pexels_api_key: ""
  pexels_base_url: "https://api.pexels.com/v1"
  # Artlist scraper optimizations
  # Level 1+2: in-memory cache (default 24h TTL, background refresh at 75% TTL)
  artlist_live_search_cache_ttl_hours: 24
  # Level 3: persistent Node.js scraper server (keep Chromium warm between searches)
  # Start with: node node-scraper/artlist_server.js
  # Or: sudo systemctl start artlist-scraper
  artlist_scraper_server_url: ""  # e.g. "http://localhost:9123" when server is running
  nvidia_api_key: ""
  nvidia_model: "flux-1-schnell"

video:
  width: 1920
  height: 1080
  fps: 30
  codec: "libx264"
  preset: "medium"
  crf: 18
  keyframe_interval: 60
  audio_codec: "aac"
  audio_bitrate: "128k"
  clip_duration: 5
  chunk_duration: 25
  max_clips_per_source: 30
  search_count: 25
  overlay_opacity: 0.25
  effect_interval: 4
  transition_presets:
    - "fade"
    - "fadeblack"
    - "fadewhite"
    - "slideleft"
    - "slideright"
    - "slideup"
    - "slidedown"
    - "circleclose"
    - "circleopen"
    - "horzclose"
    - "horzopen"
    - "vertclose"
    - "vertopen"
    - "dissolve"
    - "pixelize"
    - "wipeleft"
    - "wiperight"
    - "wipeup"
    - "wipedown"
    - "smoothleft"
    - "smoothright"
    - "smoothup"
    - "smoothdown"
    - "radial"
    - "hblur"
    - "fadegrays"
    - "squeezeh"
    - "squeezev"

drive:
  # Single root — gerarchia unificata PipelineGen Media
  # Se vuoto, usa i legacy roots come fallback
  media_root_folder: ""
  # Legacy roots (restano fino a migrazione completa)
  stock_root_folder: "1wt4hqmHD5qEsNhpUUBszlRkSHhyFgtGh"
  clips_root_folder: "1ID_oFJF15Q5nmiZF0d2NaJeKhsOJpQNS"
  images_root_folder: "14gbQ3ucY9TaRs0aGPkJxTpczGv7tQW4C"
  voiceover_root_folder: "1wFhLmyyIH5rKSbtQuCuua9a2LKQymA8A"
  artlist_root_folder: "1OAAf5dawAppdopsgCq1yHFGPUXCI9Vbk"
  video_ai_root_folder: "1m83vpyunkUrtWoUcQyRhnGrp0S5SYvQ9"
  copertine_root_folder: "1iifOcR4ZrZAep8y1lT3qc1Ku0Z9XwbaZ"
  sound_effects_root_folder: "1vfZQHVNZab-pU2fBaj4qzR3iSz1sOVhW"
  outro_root_folder: "12z9U1KRM5C5WmC9xOS2kRtdBDCyL-vbq"

features:
  artlist_enabled: true
  youtube_enabled: true
  drive_enabled: true
  voiceover_enabled: true
  script_docs_enabled: true
  images_enabled: true
  workflow_enabled: true
  stock_pipeline_enabled: true
  google_accounting_enabled: true

google_accounting:
  enabled: true
  server_url: "http://localhost:8000"
  download_dir: "./data/google_vids"
  sessions_path: "./google-accounting/sessions"
  schedule_cron: "0 2 * * *"
  vids_project_id: "" # ID of an existing Google Vids project to reuse
  flow_project_id: "" # ID of an existing Google Flow project to reuse

vector_search:
  enabled: true
  provider: "qdrant"
  url: "http://127.0.0.1:6333"
  collection: "pipelinegen_assets"
  text_vector_name: "text"
  visual_vector_name: "visual"
  audio_vector_name: "audio"
  text_dimensions: 384
  visual_dimensions: 512
  audio_dimensions: 512
  min_instant_score: 0.65
  timeout_ms: 5000
  realtime_enabled: true
  allow_background_generation: true
