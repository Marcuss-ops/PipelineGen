server:
  host: "0.0.0.0"
  port: 8080
  gin_mode: "release"

logging:
  level: "info"
  format: "json"

storage:
  data_dir: "./data"

security:
  enable_auth: false
  admin_token: ""
  rate_limit_enabled: true
  rate_limit_requests: 100
  allowed_download_hosts:
    - "youtube.com"
    - "www.youtube.com"
    - "youtu.be"
    - "artlist.com"
    - "www.artlist.com"
    - "artlist.io"
    - "cdn.artlist.io"

external:
  ollama_url: "http://localhost:11434"
  ollama_model: "gemma3:4b"
  pixabay_api_key: ""
  pixabay_base_url: "https://pixabay.com/api"
  pexels_api_key: ""
  pexels_base_url: "https://api.pexels.com/v1"
  nvidia_api_key: "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"
  nvidia_model: "flux-1-dev"

video:
  width: 1920
  height: 1080
  fps: 30
  codec: "libx264"
  preset: "medium"
  crf: 18
  keyframe_interval: 60
  audio_codec: "aac"
  audio_bitrate: "128k"
  clip_duration: 5
  chunk_duration: 25
  max_clips_per_source: 30
  search_count: 25
  overlay_opacity: 0.25
  effect_interval: 4
  transition_presets:
    - "fade"
    - "fadeblack"
    - "fadewhite"
    - "slideleft"
    - "slideright"
    - "slideup"
    - "slidedown"
    - "circleclose"
    - "circleopen"
    - "horzclose"
    - "horzopen"
    - "vertclose"
    - "vertopen"
    - "dissolve"
    - "pixelize"
    - "wipeleft"
    - "wiperight"
    - "wipeup"
    - "wipedown"
    - "smoothleft"
    - "smoothright"
    - "smoothup"
    - "smoothdown"
    - "radial"
    - "hblur"
    - "fadegrays"
    - "squeezeh"
    - "squeezev"

drive:
  stock_root_folder: "1wt4hqmHD5qEsNhpUUBszlRkSHhyFgtGh"
  clips_root_folder: ""
  images_root_folder: "1kr8c1KZmUus10mkIdqJlYqAzXDyoNZeY"
  voiceover_root_folder: "1pOtdxW9r0vbGNtBb8DQYcBeCR84wEw4N"

features:
  artlist_enabled: true
  youtube_enabled: true
  drive_enabled: true
  voiceover_enabled: true
  script_docs_enabled: true
  images_enabled: true
  workflow_enabled: true
  stock_pipeline_enabled: true
  google_accounting_enabled: true

google_accounting:
  enabled: true
  server_url: "http://localhost:8000"
  download_dir: "./data/google_vids"
  sessions_path: "./google-accounting/sessions"
  schedule_cron: "0 2 * * *"
