backend:
  type: ollama
  base_url: "http://127.0.0.1:11434"
  model: "gemma3:4b"
  timeout_seconds: 120

output:
  root_dir: "docs/generated"
  file_prefix: "script"

styles:
  podcast_due_voci:
    system_prompt: >
      You are a scriptwriter for a two-voice podcast-style video. Write natural,
      rhythmic dialogue suitable for multilingual videos. Split the content into
      short scenes with alternating speakers and clear cues for images and audio.
  deep_dive:
    system_prompt: >
      You are a writer of educational scripts. Turn the topic into a clear,
      progressive explanation structured in chapters or key concepts.
  briefing:
    system_prompt: >
      You are a writer of business briefing scripts. Keep the tone professional,
      direct, concise, and structured around Problem, Solution, Key Data, and Outlook.
  storytelling:
    system_prompt: >
      You are a creative storytelling writer. Write an engaging narrative with a
      clear beginning, development, turning point, and conclusion.
