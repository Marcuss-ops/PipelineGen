name: test_artlist_pipeline

defaults:
  strategy: verify

steps:
  - id: artlist_search
    uses: artlist.run
    with:
      term: ocean-waves
      limit: 2
      strategy: "{{ workflow.defaults.strategy }}"
    wait:
      interval_ms: 2000
      timeout_seconds: 900
      success: ["completed"]
      failure: ["failed", "cancelled", "zombie"]
