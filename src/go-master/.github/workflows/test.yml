name: Test & Coverage

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'go-master/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'go-master/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-master
    
    strategy:
      matrix:
        go-version: ['1.18', '1.19', '1.20', '1.21']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run go vet
      run: go vet ./...
    
    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Generate coverage report
      run: |
        go tool cover -func=coverage.out -o=coverage.txt
        go tool cover -html=coverage.out -o=coverage.html
    
    - name: Check coverage threshold
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: $COVERAGE%"
        if (( $(echo "$COVERAGE < 60" | bc -l) )); then
          echo "Coverage $COVERAGE% is below threshold of 60%"
          exit 1
        fi
        echo "✅ Coverage $COVERAGE% meets threshold of 60%"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./go-master/coverage.out
        flags: unittests
        name: codecov-umbrella
    
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.go-version }}
        path: |
          ./go-master/coverage.out
          ./go-master/coverage.html
          ./go-master/coverage.txt

  integration-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-master
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-integration-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-integration-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run integration tests
      run: go test -v -tags=integration ./tests/integration/... 2>&1 | tee integration-test-output.txt
      env:
        SKIP_INTEGRATION_TESTS: ""
    
    - name: Upload integration test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: ./go-master/integration-test-output.txt

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-master
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build server
      run: go build -v ./cmd/server
    
    - name: Build all packages
      run: go build -v ./...
    
    - name: Check for vulnerabilities
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-master
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        working-directory: ./go-master
        args: --timeout=5m

  swagger:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-master
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install swag
      run: go install github.com/swaggo/swag/cmd/swag@latest
    
    - name: Generate Swagger docs
      run: swag init -g cmd/server/main.go
    
    - name: Check Swagger docs are up to date
      run: |
        if [ -n "$(git status --porcelain docs/)" ]; then
          echo "❌ Swagger docs are out of date. Please run 'swag init' and commit the changes."
          git diff docs/
          exit 1
        fi
        echo "✅ Swagger docs are up to date"