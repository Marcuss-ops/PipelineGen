server:
  host: "127.0.0.1"
  port: 8080
  gin_mode: "release"

logging:
  level: "info"
  format: "json"

storage:
  data_dir: "./data"
  voiceovers_dir: "voiceovers"
  assets_dir: "assets/subjects"
  downloads_dir: "downloads"
  backups_dir: "backups"
  temp_dir: "tmp"

security:
  # IMPORTANT: Enable auth and set admin_token for production use.
  # Default is true - you MUST set an admin_token.
  enable_auth: true
  admin_token: "YOUR_SECURE_TOKEN_HERE"
  worker_token: "YOUR_WORKER_TOKEN_HERE"
  # CORS origins - leave empty to block all cross-origin requests
  cors_origins: []
  rate_limit_enabled: true
  rate_limit_requests: 100
  # Download host whitelist - REQUIRED for security
  # Only hosts in this list can be used for downloads
  allowed_download_hosts:
    - "youtube.com"
    - "www.youtube.com"
    - "youtu.be"
    - "artlist.com"
    - "www.artlist.com"
    - "artlist.io"
    - "cdn.artlist.io"

external:
  ollama_url: "http://localhost:11434"
  ollama_model: "gemma3:4b"
  ollama_timeout_seconds: 120
  ytdlp_path: "yt-dlp"
  ffmpeg_path: "ffmpeg"

paths:
  node_scraper_dir: "node-scraper"
  python_scripts_dir: "scripts"
  credentials_file: "credentials.json"
  token_file: "token.json"

drive:
  stock_root_folder: ""
  clips_root_folder: ""

harvester:
  enabled: true
  drive_folder_id: ""
  check_interval: "1h"

video:
  width: 1280
  height: 720
  fps: 24
  codec: "libx264"
  preset: "veryfast"
  crf: 26
  duration: 7

jobs:
  catalog_sync_interval: "6h"
  maintenance_interval: "24h"
  backup_interval: "6h"
  indexing_interval: "15m"

features:
  # Stable modules - enable as needed
  artlist_enabled: false
  youtube_enabled: false
  drive_enabled: false
  # Experimental modules - default to false
  harvester_enabled: false
  script_docs_enabled: false
  script_clips_enabled: false
  stock_enabled: false
